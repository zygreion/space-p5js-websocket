<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Import libraries -->
    <script src="../libraries/p5.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <!-- Import styles -->
    <link rel="stylesheet" type="text/css" href="style.css" />

    <title>Draw</title>
  </head>
  <body>
    <div class="main-wrapper">
      <main></main>

      <div class="sections-wrapper">
        <section>
          <div id="object-title">Object</div>
          <div>
            <button onclick="addIndexBy(-1)">Prev</button>
            <button onclick="addIndexBy(1)">Next</button>
            <div id="special-buttons">
              <button onclick="resetObject()">Reset</button>
              <button id="submit" onclick="submit()">Submit Drawing</button>
            </div>
          </div>
        </section>

        <section>
          <div id="color-title">Color</div>
          <div id="color-button-wrapper">
            <!-- Buttons will be generated by sketch.js -->
          </div>
        </section>

        <section>
          <div id="brush-size-title">Size</div>
          <input
            id="brush-size-input"
            type="range"
            min="10"
            value="25"
            max="50"
            oninput="changeBrushSize(this.value)"
          />
        </section>
      </div>
    </div>

    <script src="./sketch.js"></script>
  </body>
</html>
